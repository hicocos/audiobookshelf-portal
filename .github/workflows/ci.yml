name: CI

on:
  push:
    branches: [main, release/**]
    tags: ['v*']
  pull_request:

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [backend, bot]
    defaults:
      run:
        working-directory: ${{ matrix.component }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: '0.11.29'
          python-version: '3.13'
      - run: uv sync --frozen --extra dev
      - run: uv run pytest -q
      - run: uv run ruff check app tests
      - run: uv run bandit -q -r app
      - run: uv run pip-audit

  web:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:3009
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - run: npm audit --audit-level=high
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - run: python3 ../scripts/check_public_assets.py

  container:
    runs-on: ubuntu-latest
    needs: [python, web]
    steps:
      - uses: actions/checkout@v4
      - name: Generate isolated CI configuration
        run: ./scripts/deploy.sh init
      - run: docker compose config -q
      - run: docker compose -f compose.phase4-lab.yml config -q
      - name: Build production images once
        env:
          BUILD_VERSION: ${{ github.sha }}
          BUILD_COMMIT: ${{ github.sha }}
          BUILD_DATE: ${{ github.event.repository.updated_at }}
        run: docker compose build moyin-api moyin-bot moyin-web
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: audiobookshelf-portal-backend:${{ github.sha }}
          artifact-name: backend-sbom.spdx.json
      - name: Generate Web SBOM
        uses: anchore/sbom-action@v0
        with:
          image: audiobookshelf-portal-web:${{ github.sha }}
          artifact-name: web-sbom.spdx.json
      - name: Generate Bot SBOM
        uses: anchore/sbom-action@v0
        with:
          image: audiobookshelf-portal-bot:${{ github.sha }}
          artifact-name: bot-sbom.spdx.json
      - name: Scan backend image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: audiobookshelf-portal-backend:${{ github.sha }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'
      - name: Scan Web image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: audiobookshelf-portal-web:${{ github.sha }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'
      - name: Scan Bot image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: audiobookshelf-portal-bot:${{ github.sha }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'
      - name: Audit pinned Audiobookshelf image (informational)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/advplyr/audiobookshelf@sha256:1eef6716183c52abafe5405e7d6be8390248ecd59c7488c44af871757ac8fc4d
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '0'
