x-build-args: &build-args
  BUILD_VERSION: ${BUILD_VERSION:-dev}
  BUILD_COMMIT: ${BUILD_COMMIT:-unknown}
  BUILD_DATE: ${BUILD_DATE:-unknown}

x-build-labels: &build-labels
  org.opencontainers.image.version: ${BUILD_VERSION:-dev}
  org.opencontainers.image.revision: ${BUILD_COMMIT:-unknown}
  org.opencontainers.image.created: ${BUILD_DATE:-unknown}

services:
  audiobookshelf:
    image: ghcr.io/advplyr/audiobookshelf@sha256:1eef6716183c52abafe5405e7d6be8390248ecd59c7488c44af871757ac8fc4d
    container_name: audiobookshelf
    restart: unless-stopped
    init: true
    stop_grace_period: 60s
    environment:
      TZ: Asia/Shanghai
      TINI_SUBREAPER: "1"
    volumes:
      - ${ABS_CONFIG_PATH:-/www/wwwroot/audiobook/config}:/config
      - ${ABS_METADATA_PATH:-/www/wwwroot/audiobook/metadata}:/metadata
      - ${ABS_AUDIOBOOKS_PATH:-/www/wwwroot/books}:/audiobooks
      - ${ABS_PODCASTS_PATH:-/www/podcasts}:/podcasts
    ports:
      - "127.0.0.1:13268:80"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1/ping').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging: &default-logging
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    mem_limit: 2g
    mem_reservation: 256m
    cpus: 2.0
    pids_limit: 256
    security_opt:
      - no-new-privileges:true

  moyin-api:
    image: audiobookshelf-portal-backend:${BUILD_VERSION:-dev}
    build:
      context: ./backend
      args: *build-args
      labels: *build-labels
    container_name: moyin-api
    restart: unless-stopped
    init: true
    stop_grace_period: 30s
    env_file: .env.api
    environment:
      TZ: Asia/Shanghai
    volumes:
      - moyin-data:/data
    ports:
      - "${API_BIND:-127.0.0.1}:${API_PORT:-8019}:8000"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/public/health/ready', timeout=5).read()"
      interval: 30s
      timeout: 8s
      retries: 3
      start_period: 30s
    logging: *default-logging
    mem_limit: 768m
    mem_reservation: 128m
    cpus: 1.5
    pids_limit: 128
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  moyin-web:
    image: audiobookshelf-portal-web:${BUILD_VERSION:-dev}
    build:
      context: ./web
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8019}
        <<: *build-args
      labels: *build-labels
    container_name: moyin-web
    restart: unless-stopped
    init: true
    stop_grace_period: 30s
    environment:
      PORT: 3009
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      TZ: Asia/Shanghai
    ports:
      - "${WEB_BIND:-127.0.0.1}:${WEB_PORT:-3009}:3009"
    depends_on:
      moyin-api:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "const os=require('os');fetch('http://'+os.hostname()+':3009/').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging: *default-logging
    mem_limit: 512m
    mem_reservation: 96m
    cpus: 1.0
    pids_limit: 128
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  moyin-bot:
    image: audiobookshelf-portal-bot:${BUILD_VERSION:-dev}
    build:
      context: ./bot
      args: *build-args
      labels: *build-labels
    container_name: moyin-bot
    restart: unless-stopped
    init: true
    stop_grace_period: 30s
    env_file: .env.bot
    environment:
      TZ: Asia/Shanghai
    depends_on:
      moyin-api:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "from app.health import check_bot_health; check_bot_health()"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging: *default-logging
    mem_limit: 384m
    mem_reservation: 64m
    cpus: 0.75
    pids_limit: 96
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=32m
      - /run/moyin-bot:rw,noexec,nosuid,size=1m,uid=10002,gid=10002,mode=0700
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

volumes:
  moyin-data:
